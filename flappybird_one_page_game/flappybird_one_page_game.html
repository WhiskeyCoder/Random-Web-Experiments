<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #2c3e50;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas {
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    cursor: pointer;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive sizing
const W = 400;
const H = 600;
canvas.width = W;
canvas.height = H;

// Game state
let gameState = 'start'; // start, playing, dead
let score = 0;
let bestScore = parseInt(localStorage.getItem('flappyBest')) || 0;
let frameCount = 0;

// Bird
const bird = {
    x: 80,
    y: H / 2,
    w: 34,
    h: 26,
    velocity: 0,
    gravity: 0.45,
    flapStrength: -7.5,
    rotation: 0,
    flapFrame: 0,
    alive: true,
    reset() {
        this.y = H / 2;
        this.velocity = 0;
        this.rotation = 0;
        this.alive = true;
        this.flapFrame = 0;
    }
};

// Pipes
let pipes = [];
const pipeWidth = 58;
const pipeGap = 145;
const pipeSpeed = 2.5;
let pipeTimer = 0;
const pipeInterval = 95;

// Particles
let particles = [];

// Ground
const groundHeight = 80;
let groundX = 0;

// Colors
const colors = {
    sky1: '#4dc9f6',
    sky2: '#a8e6cf',
    pipeGreen: '#5cb85c',
    pipeDark: '#4a9a4a',
    pipeLight: '#6ecf6e',
    pipeBorder: '#3d7a3d',
    ground: '#ded895',
    groundDark: '#d2c87a',
    groundStripe: '#c4b865',
    birdBody: '#f5c842',
    birdDark: '#e6a817',
    birdWing: '#f0983a',
    birdBeak: '#ff6b4a',
    birdEye: '#fff',
    birdPupil: '#333'
};

function spawnPipe() {
    const minY = 80;
    const maxY = H - groundHeight - pipeGap - 80;
    const topHeight = minY + Math.random() * (maxY - minY);
    pipes.push({
        x: W + 10,
        topHeight: topHeight,
        scored: false
    });
}

function flap() {
    if (gameState === 'start') {
        gameState = 'playing';
        bird.velocity = bird.flapStrength;
        bird.flapFrame = 10;
        return;
    }
    if (gameState === 'dead') {
        // wait a moment before allowing restart
        return;
    }
    if (gameState === 'playing') {
        bird.velocity = bird.flapStrength;
        bird.flapFrame = 10;
        // flap particles
        for (let i = 0; i < 3; i++) {
            particles.push({
                x: bird.x - 5,
                y: bird.y + 5,
                vx: -Math.random() * 2 - 1,
                vy: Math.random() * 2 + 1,
                life: 20 + Math.random() * 10,
                maxLife: 30,
                size: 3 + Math.random() * 3,
                color: `hsl(${45 + Math.random() * 20}, 90%, ${70 + Math.random() * 20}%)`
            });
        }
    }
}

function die() {
    gameState = 'dead';
    bird.alive = false;
    // death particles
    for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        particles.push({
            x: bird.x,
            y: bird.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            life: 40 + Math.random() * 20,
            maxLife: 60,
            size: 3 + Math.random() * 5,
            color: `hsl(${Math.random() * 60 + 30}, 90%, ${60 + Math.random() * 30}%)`
        });
    }
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('flappyBest', bestScore);
    }
}

function reset() {
    bird.reset();
    pipes = [];
    particles = [];
    score = 0;
    pipeTimer = 0;
    gameState = 'start';
}

// Input
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        flap();
    }
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); });

// Collision
function checkCollision() {
    // Ground and ceiling
    if (bird.y + bird.h / 2 >= H - groundHeight) {
        bird.y = H - groundHeight - bird.h / 2;
        return true;
    }
    if (bird.y - bird.h / 2 <= 0) {
        bird.y = bird.h / 2;
        bird.velocity = 0;
    }

    // Pipes
    const birdBox = {
        left: bird.x - bird.w / 2 + 4,
        right: bird.x + bird.w / 2 - 4,
        top: bird.y - bird.h / 2 + 4,
        bottom: bird.y + bird.h / 2 - 4
    };

    for (const pipe of pipes) {
        const pipeLeft = pipe.x;
        const pipeRight = pipe.x + pipeWidth;

        if (birdBox.right > pipeLeft && birdBox.left < pipeRight) {
            if (birdBox.top < pipe.topHeight || birdBox.bottom > pipe.topHeight + pipeGap) {
                return true;
            }
        }
    }
    return false;
}

// Drawing functions
function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, H - groundHeight);
    grad.addColorStop(0, '#4ec5f1');
    grad.addColorStop(0.5, '#7dd8f5');
    grad.addColorStop(1, '#b8eef7');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H - groundHeight);

    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    const cloudOffset = (frameCount * 0.3) % (W + 200);
    drawCloud(300 - cloudOffset + W, 80, 1);
    drawCloud(500 - cloudOffset + W, 140, 0.7);
    drawCloud(100 - cloudOffset + W, 200, 0.85);
    drawCloud(700 - cloudOffset + W, 60, 0.6);
}

function drawCloud(x, y, scale) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.beginPath();
    ctx.arc(0, 0, 25, 0, Math.PI * 2);
    ctx.arc(25, -5, 20, 0, Math.PI * 2);
    ctx.arc(-25, 0, 20, 0, Math.PI * 2);
    ctx.arc(10, -15, 18, 0, Math.PI * 2);
    ctx.arc(-10, -10, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function drawPipe(pipe) {
    const topH = pipe.topHeight;
    const bottomY = topH + pipeGap;
    const bottomH = H - groundHeight - bottomY;

    // Top pipe
    drawSinglePipe(pipe.x, 0, pipeWidth, topH, true);
    // Bottom pipe
    drawSinglePipe(pipe.x, bottomY, pipeWidth, bottomH, false);
}

function drawSinglePipe(x, y, w, h, isTop) {
    // Main body
    const grad = ctx.createLinearGradient(x, 0, x + w, 0);
    grad.addColorStop(0, colors.pipeDark);
    grad.addColorStop(0.2, colors.pipeLight);
    grad.addColorStop(0.5, colors.pipeGreen);
    grad.addColorStop(1, colors.pipeDark);
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, w, h);

    // Border
    ctx.strokeStyle = colors.pipeBorder;
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);

    // Cap
    const capH = 26;
    const capW = w + 10;
    const capX = x - 5;
    const capY = isTop ? y + h - capH : y;

    const capGrad = ctx.createLinearGradient(capX, 0, capX + capW, 0);
    capGrad.addColorStop(0, colors.pipeDark);
    capGrad.addColorStop(0.15, colors.pipeLight);
    capGrad.addColorStop(0.5, colors.pipeGreen);
    capGrad.addColorStop(1, colors.pipeDark);
    ctx.fillStyle = capGrad;

    ctx.beginPath();
    ctx.roundRect(capX, capY, capW, capH, 4);
    ctx.fill();
    ctx.strokeStyle = colors.pipeBorder;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(capX, capY, capW, capH, 4);
    ctx.stroke();
}

function drawGround() {
    // Main ground
    const grad = ctx.createLinearGradient(0, H - groundHeight, 0, H);
    grad.addColorStop(0, colors.ground);
    grad.addColorStop(0.3, colors.groundDark);
    grad.addColorStop(1, '#b8a855');
    ctx.fillStyle = grad;
    ctx.fillRect(0, H - groundHeight, W, groundHeight);

    // Top edge
    ctx.fillStyle = '#5cb85c';
    ctx.fillRect(0, H - groundHeight, W, 15);

    const edgeGrad = ctx.createLinearGradient(0, H - groundHeight, 0, H - groundHeight + 15);
    edgeGrad.addColorStop(0, '#6ecf6e');
    edgeGrad.addColorStop(1, '#4a9a4a');
    ctx.fillStyle = edgeGrad;
    ctx.fillRect(0, H - groundHeight, W, 15);

    // Ground pattern
    ctx.fillStyle = colors.groundStripe;
    for (let i = -1; i < W / 24 + 2; i++) {
        const sx = (i * 24 + (groundX % 24)) ;
        ctx.beginPath();
        ctx.moveTo(sx, H - groundHeight + 15);
        ctx.lineTo(sx + 12, H - groundHeight + 30);
        ctx.lineTo(sx + 24, H - groundHeight + 15);
        ctx.fill();
    }
}

function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);

    // Rotation based on velocity
    let targetRotation = bird.velocity * 3;
    targetRotation = Math.max(-30, Math.min(70, targetRotation));
    bird.rotation += (targetRotation - bird.rotation) * 0.15;
    ctx.rotate(bird.rotation * Math.PI / 180);

    // Wing flap animation
    const flapCycle = bird.flapFrame > 0 ? bird.flapFrame / 10 : 0;

    // Body shadow
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.ellipse(2, 3, bird.w / 2, bird.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    const bodyGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, bird.w / 2);
    bodyGrad.addColorStop(0, '#ffe066');
    bodyGrad.addColorStop(0.7, colors.birdBody);
    bodyGrad.addColorStop(1, colors.birdDark);
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, bird.w / 2, bird.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#c49a00';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Wing
    const wingY = flapCycle > 0.5 ? -8 : 3;
    ctx.fillStyle = colors.birdWing;
    ctx.beginPath();
    ctx.ellipse(-4, wingY, 10, 6 + flapCycle * 4, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#d4800a';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Eye (white)
    ctx.fillStyle = colors.birdEye;
    ctx.beginPath();
    ctx.arc(8, -5, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Pupil
    ctx.fillStyle = colors.birdPupil;
    ctx.beginPath();
    ctx.arc(10, -5, 3, 0, Math.PI * 2);
    ctx.fill();

    // Eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(11, -6.5, 1.2, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = colors.birdBeak;
    ctx.beginPath();
    ctx.moveTo(12, 1);
    ctx.lineTo(22, 3);
    ctx.lineTo(12, 7);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#cc4a30';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Lower beak
    ctx.fillStyle = '#e85a3a';
    ctx.beginPath();
    ctx.moveTo(12, 4);
    ctx.lineTo(20, 5);
    ctx.lineTo(12, 7);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

function drawParticles() {
    for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

function drawScore() {
    if (gameState === 'playing' || gameState === 'dead') {
        ctx.save();
        ctx.font = 'bold 52px "Segoe UI", Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillText(score, W / 2 + 3, 53);

        // White outline
        ctx.strokeStyle = '#533e1f';
        ctx.lineWidth = 6;
        ctx.strokeText(score, W / 2, 50);

        // Fill
        ctx.fillStyle = '#fff';
        ctx.fillText(score, W / 2, 50);

        ctx.restore();
    }
}

function drawStartScreen() {
    // Title
    ctx.save();
    ctx.font = 'bold 46px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillText('Flappy Bird', W / 2 + 3, H / 2 - 120);

    ctx.strokeStyle = '#533e1f';
    ctx.lineWidth = 5;
    ctx.strokeText('Flappy Bird', W / 2, H / 2 - 123);

    ctx.fillStyle = '#fff';
    ctx.fillText('Flappy Bird', W / 2, H / 2 - 123);

    // Instructions
    const bob = Math.sin(frameCount * 0.06) * 5;
    ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#533e1f';
    ctx.lineWidth = 3;
    const msg = 'Click or Press Space to Start';
    ctx.strokeText(msg, W / 2, H / 2 + bob);
    ctx.fillText(msg, W / 2, H / 2 + bob);

    // Best score
    if (bestScore > 0) {
        ctx.font = 'bold 18px "Segoe UI", Arial, sans-serif';
        ctx.fillStyle = '#ffe066';
        ctx.strokeStyle = '#533e1f';
        ctx.lineWidth = 2;
        ctx.strokeText(`Best: ${bestScore}`, W / 2, H / 2 + 50);
        ctx.fillText(`Best: ${bestScore}`, W / 2, H / 2 + 50);
    }

    ctx.restore();
}

function drawDeadScreen() {
    // Overlay
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, W, H);

    // Score panel
    const panelW = 240;
    const panelH = 160;
    const px = (W - panelW) / 2;
    const py = (H - panelH) / 2 - 30;

    // Panel background
    ctx.fillStyle = '#deb870';
    ctx.beginPath();
    ctx.roundRect(px, py, panelW, panelH, 12);
    ctx.fill();
    ctx.strokeStyle = '#533e1f';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(px, py, panelW, panelH, 12);
    ctx.stroke();

    // Inner panel
    ctx.fillStyle = '#c49a5a';
    ctx.beginPath();
    ctx.roundRect(px + 15, py + 40, panelW - 30, panelH - 55, 8);
    ctx.fill();

    // Game Over text
    ctx.font = 'bold 36px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#533e1f';
    ctx.lineWidth = 4;
    ctx.strokeText('Game Over', W / 2, py + 28);
    ctx.fillText('Game Over', W / 2, py + 28);

    // Score
    ctx.font = 'bold 18px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    ctx.fillText('Score:', px + 30, py + 65);
    ctx.textAlign = 'right';
    ctx.fillText(score, px + panelW - 25, py + 65);

    // Best
    ctx.textAlign = 'left';
    ctx.fillText('Best:', px + 30, py + 100);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffe066';
    ctx.fillText(bestScore, px + panelW - 25, py + 100);

    // Medal
    if (score >= 5) {
        const medalColor = score >= 40 ? '#ffd700' : score >= 20 ? '#c0c0c0' : '#cd7f32';
        ctx.fillStyle = medalColor;
        ctx.beginPath();
        ctx.arc(px + panelW - 55, py + 82, 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#533e1f';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('★', px + panelW - 55, py + 86);
    }

    // Restart prompt
    const bob = Math.sin(frameCount * 0.06) * 3;
    ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#533e1f';
    ctx.lineWidth = 3;
    const msg = 'Click to Restart';
    ctx.strokeText(msg, W / 2, py + panelH + 50 + bob);
    ctx.fillText(msg, W / 2, py + panelH + 50 + bob);

    ctx.restore();
}

function update() {
    frameCount++;

    if (gameState === 'playing') {
        // Bird physics
        bird.velocity += bird.gravity;
        bird.y += bird.velocity;
        if (bird.flapFrame > 0) bird.flapFrame--;

        // Pipes
        pipeTimer++;
        if (pipeTimer >= pipeInterval) {
            spawnPipe();
            pipeTimer = 0;
        }

        for (let i = pipes.length - 1; i >= 0; i--) {
            pipes[i].x -= pipeSpeed;

            // Score
            if (!pipes[i].scored && pipes[i].x + pipeWidth < bird.x) {
                pipes[i].scored = true;
                score++;
                // Score particle
                for (let j = 0; j < 5; j++) {
                    particles.push({
                        x: bird.x + 20,
                        y: bird.y - 20,
                        vx: Math.random() * 2 - 1,
                        vy: -Math.random() * 3 - 1,
                        life: 25,
                        maxLife: 25,
                        size: 3 + Math.random() * 3,
                        color: `hsl(${50 + Math.random() * 20}, 100%, ${70 + Math.random() * 20}%)`
                    });
                }
            }

            // Remove off-screen pipes
            if (pipes[i].x + pipeWidth < -10) {
                pipes.splice(i, 1);
            }
        }

        // Ground scroll
        groundX -= pipeSpeed;

        // Collision
        if (checkCollision()) {
            die();
        }
    }

    if (gameState === 'start') {
        // Bird bob
        bird.y = H / 2 + Math.sin(frameCount * 0.05) * 12;
        groundX -= 1;
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    drawSky();

    // Draw pipes behind bird
    for (const pipe of pipes) {
        drawPipe(pipe);
    }

    drawGround();
    drawBird();
    drawParticles();
    drawScore();

    if (gameState === 'start') drawStartScreen();
    if (gameState === 'dead') drawDeadScreen();
}

// Game loop
let lastTime = 0;
let accumulator = 0;
const step = 1000 / 60;

function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const delta = timestamp - lastTime;
    lastTime = timestamp;
    accumulator += Math.min(delta, 100);

    while (accumulator >= step) {
        update();
        accumulator -= step;
    }

    draw();
    requestAnimationFrame(gameLoop);
}

// Handle restart on click when dead
let canRestart = false;
let restartTimer = null;
const origDie = die;
die = function() {
    origDie();
    canRestart = false;
    clearTimeout(restartTimer);
    restartTimer = setTimeout(() => { canRestart = true; }, 300);
};

canvas.addEventListener('click', () => {
    if (gameState === 'dead' && canRestart) {
        reset();
    }
});
canvas.addEventListener('touchstart', (e) => {
    if (gameState === 'dead' && canRestart) {
        e.preventDefault();
        reset();
    }
});

// roundRect polyfill
if (!ctx.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (typeof r === 'number') r = [r, r, r, r];
        const [tl, tr, br, bl] = r;
        this.moveTo(x + tl, y);
        this.lineTo(x + w - tr, y);
        this.quadraticCurveTo(x + w, y, x + w, y + tr);
        this.lineTo(x + w, y + h - br);
        this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
        this.lineTo(x + bl, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - bl);
        this.lineTo(x, y + tl);
        this.quadraticCurveTo(x, y, x + tl, y);
        this.closePath();
    };
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
